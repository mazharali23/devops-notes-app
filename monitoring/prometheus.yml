global:
  scrape_interval: 5s

scrape_configs:

  - job_name: "node-exporter"
    static_configs:
      - targets: ["node-exporter:9100"]

  - job_name: "backend"
    static_configs:
      - targets: ["backend:5000"]

alerting:
  alertmanagers:
    - static_configs:
        - targets:
          - "alertmanager:9093"
